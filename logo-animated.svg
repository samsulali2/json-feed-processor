<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 110" width="900" height="110">
  <defs>
    <style>
      .crazy {
        font-family: 'Arial Black', sans-serif;
        font-weight: 900;
        fill: white;
        font-size: 36px;
        letter-spacing: 3px;
        animation: crazy-shake 5s ease-in-out infinite;
        transform-origin: 300px 58px;
      }
      @keyframes crazy-shake {
        0%,85%,100% { transform: translateX(0) rotate(0deg); }
        87% { transform: translateX(-3px) rotate(-1deg); }
        90% { transform: translateX(3px) rotate(1deg); }
        93% { transform: translateX(-2px) rotate(-0.5deg); }
        96% { transform: translateX(2px) rotate(0.5deg); }
      }
      .online {
        font-family: 'Arial Black', sans-serif;
        font-weight: 900;
        fill: #00D4FF;
        font-size: 36px;
        letter-spacing: 3px;
        animation: cyan-glow 2s ease-in-out infinite;
      }
      .deals {
        font-family: 'Arial Black', sans-serif;
        font-weight: 900;
        fill: #00D4FF;
        font-size: 36px;
        letter-spacing: 3px;
        animation: cyan-glow 2s ease-in-out infinite 0.4s;
      }
      @keyframes cyan-glow {
        0%,100% { fill: #00D4FF; filter: drop-shadow(0 0 3px rgba(0,212,255,0.3)); }
        50% { fill: #00FFFF; filter: drop-shadow(0 0 12px rgba(0,255,255,0.9)); }
      }
      .star {
        animation: star-spin 4s linear infinite;
        transform-origin: 110px 55px;
      }
      @keyframes star-spin {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.3); }
        100% { transform: rotate(360deg) scale(1); }
      }
      .cart {
        animation: cart-bounce 2.5s ease-in-out infinite;
        transform-origin: 45px 55px;
      }
      @keyframes cart-bounce {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      .spark1 { animation: sf1 2s ease-out infinite; }
      .spark2 { animation: sf2 2s ease-out infinite 0.4s; }
      .spark3 { animation: sf3 2s ease-out infinite 0.8s; }
      .spark4 { animation: sf4 2s ease-out infinite 1.2s; }
      .spark5 { animation: sf5 2s ease-out infinite 1.6s; }
      .spark6 { animation: sf6 2s ease-out infinite 0.2s; }
      @keyframes sf1 { 0%{transform:translate(0,0);opacity:1;} 100%{transform:translate(-30px,-25px);opacity:0;} }
      @keyframes sf2 { 0%{transform:translate(0,0);opacity:1;} 100%{transform:translate(30px,-28px);opacity:0;} }
      @keyframes sf3 { 0%{transform:translate(0,0);opacity:1;} 100%{transform:translate(-35px,-10px);opacity:0;} }
      @keyframes sf4 { 0%{transform:translate(0,0);opacity:1;} 100%{transform:translate(35px,-12px);opacity:0;} }
      @keyframes sf5 { 0%{transform:translate(0,0);opacity:1;} 100%{transform:translate(-15px,-35px);opacity:0;} }
      @keyframes sf6 { 0%{transform:translate(0,0);opacity:1;} 100%{transform:translate(15px,-35px);opacity:0;} }
      .shine {
        animation: shine-sweep 4s linear infinite;
      }
      @keyframes shine-sweep {
        0% { transform: translateX(-900px) skewX(-15deg); opacity:0; }
        20% { opacity:0.05; }
        50% { transform: translateX(900px) skewX(-15deg); opacity:0; }
        100% { transform: translateX(900px) skewX(-15deg); opacity:0; }
      }
      .live-dot {
        animation: live-blink 1.2s ease-in-out infinite;
      }
      @keyframes live-blink {
        0%,100% { opacity:1; }
        50% { opacity:0.2; }
      }
    </style>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F0C29"/>
      <stop offset="40%" style="stop-color:#16213E"/>
      <stop offset="100%" style="stop-color:#0F2027"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD600"/>
      <stop offset="100%" style="stop-color:#FF6B00"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,107,0,0)"/>
      <stop offset="50%" style="stop-color:rgba(255,107,0,0.8)"/>
      <stop offset="100%" style="stop-color:rgba(255,107,0,0)"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="900" height="110" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="900" height="110" fill="url(#bg)"/>
    <rect class="shine" x="0" y="0" width="150" height="110" fill="white"/>
    <rect x="0" y="106" width="900" height="4" fill="#FF6B00" opacity="0.8"/>
    <rect x="0" y="0" width="900" height="2" fill="#FF6B00" opacity="0.3"/>

    <!-- Cart icon -->
    <g class="cart">
      <path d="M18 30 L27 42 L55 42" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <path d="M27 42 L33 64 L55 64 L61 42 Z" fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
      <circle cx="36" cy="72" r="4.5" fill="white"/>
      <circle cx="54" cy="72" r="4.5" fill="white"/>
    </g>

    <!-- Divider -->
    <rect x="78" y="18" width="1.5" height="74" fill="url(#divider)"/>

    <!-- Star burst -->
    <g class="star">
      <polygon points="110,28 116,44 133,44 120,54 126,70 110,60 94,70 100,54 87,44 104,44"
               fill="url(#starGrad)"/>
    </g>

    <!-- Sparks -->
    <circle class="spark1" cx="100" cy="34" r="4" fill="#FFD600"/>
    <circle class="spark2" cx="122" cy="30" r="3" fill="#FF6B00"/>
    <circle class="spark3" cx="88" cy="44" r="3" fill="#FFD600"/>
    <circle class="spark4" cx="132" cy="42" r="3" fill="#FF9900"/>
    <circle class="spark5" cx="107" cy="24" r="3" fill="#FFEE00"/>
    <circle class="spark6" cx="115" cy="22" r="3" fill="#FF6B00"/>

    <!-- Divider -->
    <rect x="148" y="18" width="1.5" height="74" fill="url(#divider)"/>

    <!-- CRAZY -->
    <text class="crazy" x="165" y="68">CRAZY</text>

    <!-- ONLINE -->
    <text class="online" x="390" y="68">ONLINE</text>

    <!-- DEALS -->
    <text class="deals" x="650" y="68">DEALS</text>

    <!-- Live dot -->
    <circle class="live-dot" cx="872" cy="22" r="5" fill="#FF2D2D"/>
    <text x="843" y="26" font-family="Arial" font-size="9" fill="#FF2D2D" font-weight="bold">LIVE</text>
  </g>
</svg>
