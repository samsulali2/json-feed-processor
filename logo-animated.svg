<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100" width="1000" height="100">
  <defs>
    <style>
      .crazy {
        font-family: 'Arial Black', Impact, sans-serif;
        font-weight: 900; fill: white;
        font-size: 46px; letter-spacing: 4px;
        animation: crazy-shake 6s ease-in-out infinite;
        transform-origin: 290px 62px;
      }
      @keyframes crazy-shake {
        0%,88%,100% { transform: translateX(0) rotate(0deg); }
        90% { transform: translateX(-4px) rotate(-1.5deg); }
        93% { transform: translateX(4px) rotate(1.5deg); }
        96% { transform: translateX(-2px) rotate(-0.5deg); }
        98% { transform: translateX(2px) rotate(0.5deg); }
      }
      .online {
        font-family: 'Arial Black', Impact, sans-serif;
        font-weight: 900; fill: #00D4FF;
        font-size: 46px; letter-spacing: 4px;
        animation: cyan-glow 2.5s ease-in-out infinite;
      }
      .deals {
        font-family: 'Arial Black', Impact, sans-serif;
        font-weight: 900; fill: #00D4FF;
        font-size: 46px; letter-spacing: 4px;
        animation: cyan-glow 2.5s ease-in-out infinite 0.5s;
      }
      @keyframes cyan-glow {
        0%,100% { fill: #00D4FF; filter: drop-shadow(0 0 4px rgba(0,212,255,0.4)); }
        50% { fill: #40FFFF; filter: drop-shadow(0 0 18px rgba(0,255,255,1)); }
      }
      /* Cart body bounce */
      .cart-body {
        animation: cart-bounce 2.8s ease-in-out infinite;
        transform-origin: 42px 58px;
      }
      @keyframes cart-bounce {
        0%,100% { transform: translateY(0) rotate(0deg); }
        30% { transform: translateY(-6px) rotate(-3deg); }
        60% { transform: translateY(-3px) rotate(2deg); }
      }
      /* Items falling into cart */
      .item1 { animation: fall1 2.8s ease-in infinite; }
      .item2 { animation: fall2 2.8s ease-in infinite 0.4s; }
      .item3 { animation: fall3 2.8s ease-in infinite 0.8s; }
      @keyframes fall1 {
        0%   { transform: translate(0,0); opacity:0; }
        10%  { opacity:1; }
        40%  { transform: translate(4px, 22px); opacity:1; }
        50%,100% { transform: translate(4px, 22px); opacity:0; }
      }
      @keyframes fall2 {
        0%   { transform: translate(0,0); opacity:0; }
        10%  { opacity:1; }
        40%  { transform: translate(-3px, 20px); opacity:1; }
        50%,100% { transform: translate(-3px, 20px); opacity:0; }
      }
      @keyframes fall3 {
        0%   { transform: translate(0,0); opacity:0; }
        10%  { opacity:1; }
        40%  { transform: translate(1px, 18px); opacity:1; }
        50%,100% { transform: translate(1px, 18px); opacity:0; }
      }
      /* Star spin */
      .star { animation: star-spin 5s linear infinite; transform-origin: 118px 50px; }
      @keyframes star-spin {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.25); }
        100% { transform: rotate(360deg) scale(1); }
      }
      /* Sparks */
      .sp1{animation:sp1a 2.2s ease-out infinite;}
      .sp2{animation:sp2a 2.2s ease-out infinite 0.35s;}
      .sp3{animation:sp3a 2.2s ease-out infinite 0.7s;}
      .sp4{animation:sp4a 2.2s ease-out infinite 1.1s;}
      @keyframes sp1a{0%{transform:translate(0,0);opacity:1;}100%{transform:translate(-28px,-28px);opacity:0;}}
      @keyframes sp2a{0%{transform:translate(0,0);opacity:1;}100%{transform:translate(28px,-28px);opacity:0;}}
      @keyframes sp3a{0%{transform:translate(0,0);opacity:1;}100%{transform:translate(-18px,-36px);opacity:0;}}
      @keyframes sp4a{0%{transform:translate(0,0);opacity:1;}100%{transform:translate(18px,-36px);opacity:0;}}
      /* Shine sweep */
      .shine { animation: shine 5s linear infinite; }
      @keyframes shine {
        0%   { transform: translateX(-1100px) skewX(-18deg); opacity:0; }
        15%  { opacity:0.06; }
        55%  { transform: translateX(1100px) skewX(-18deg); opacity:0; }
        100% { transform: translateX(1100px) skewX(-18deg); opacity:0; }
      }
      /* Live dot */
      .live-dot { animation: blink 1.2s ease-in-out infinite; }
      @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.15;} }
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#0a0820"/>
      <stop offset="35%"  style="stop-color:#141b3a"/>
      <stop offset="65%"  style="stop-color:#141b3a"/>
      <stop offset="100%" style="stop-color:#0a0820"/>
    </linearGradient>
    <linearGradient id="starG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#FFD600"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <linearGradient id="div" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:rgba(255,107,0,0)"/>
      <stop offset="50%"  style="stop-color:rgba(255,107,0,0.7)"/>
      <stop offset="100%" style="stop-color:rgba(255,107,0,0)"/>
    </linearGradient>
    <clipPath id="clip"><rect width="1000" height="100" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1000" height="100" fill="url(#bg)"/>
    <rect class="shine" x="0" y="0" width="180" height="100" fill="white"/>
    <!-- Bottom accent bar -->
    <rect x="0" y="96" width="1000" height="4" fill="#FF6B00" opacity="0.9"/>
    <rect x="0" y="0"  width="1000" height="2" fill="#FF6B00" opacity="0.25"/>

    <!-- Cart group -->
    <g class="cart-body">
      <!-- Handle -->
      <path d="M16 28 L26 40 L62 40" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
      <!-- Body -->
      <path d="M26 40 L32 66 L60 66 L66 40 Z" fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>
      <!-- Wheels -->
      <circle cx="36" cy="74" r="5" fill="white"/>
      <circle cx="57" cy="74" r="5" fill="white"/>
      <!-- Items in cart (static base) -->
      <rect x="34" y="50" width="8" height="10" rx="2" fill="#FFD600" opacity="0.7"/>
      <rect x="45" y="48" width="8" height="12" rx="2" fill="#FF6B00" opacity="0.7"/>
    </g>

    <!-- Falling items into cart -->
    <rect class="item1" x="38" y="30" width="7" height="9" rx="2" fill="#FFD600"/>
    <rect class="item2" x="46" y="28" width="7" height="9" rx="2" fill="#FF3D3D"/>
    <rect class="item3" x="42" y="32" width="7" height="8" rx="2" fill="#00D4FF"/>

    <!-- Divider -->
    <rect x="82" y="14" width="1.5" height="72" fill="url(#div)"/>

    <!-- Star -->
    <g class="star">
      <polygon points="118,20 125,40 146,40 130,52 137,72 118,60 99,72 106,52 90,40 111,40"
               fill="url(#starG)"/>
    </g>

    <!-- Sparks around star -->
    <circle class="sp1" cx="108" cy="26" r="4" fill="#FFD600"/>
    <circle class="sp2" cx="130" cy="24" r="3.5" fill="#FF6B00"/>
    <circle class="sp3" cx="100" cy="40" r="3" fill="#FFE566"/>
    <circle class="sp4" cx="138" cy="38" r="3" fill="#FF9900"/>

    <!-- Divider -->
    <rect x="158" y="14" width="1.5" height="72" fill="url(#div)"/>

    <!-- Text -->
    <text class="crazy"  x="172" y="70">CRAZY</text>
    <text class="online" x="420" y="70">ONLINE</text>
    <text class="deals"  x="700" y="70">DEALS</text>

    <!-- LIVE indicator -->
    <circle class="live-dot" cx="960" cy="22" r="6" fill="#FF2D2D"/>
    <text x="930" y="26" font-family="Arial" font-size="10" fill="#FF2D2D" font-weight="bold" letter-spacing="1">LIVE</text>
  </g>
</svg>
