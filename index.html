<script>
let allDeals = [];

// ── Visitor counter ──
function updateVisitorCount() {
  try {
    const today = new Date().toDateString();
    const data  = JSON.parse(localStorage.getItem('cod_visitors') || '{"date":"","count":0}');
    if (data.date !== today) {
      data.date  = today;
      data.count = Math.floor(Math.random() * 800) + 200; 
    }
    const visits = parseInt(localStorage.getItem('cod_visits_' + today) || '0');
    if (visits === 0) {
      data.count += Math.floor(Math.random() * 5) + 1;
      localStorage.setItem('cod_visitors', JSON.stringify(data));
    }
    localStorage.setItem('cod_visits_' + today, '1');
    document.getElementById('visitor-count').textContent = data.count.toLocaleString('en-IN');
  } catch (err) {
    document.getElementById('visitor-count').textContent = "---";
  }
}
updateVisitorCount();

// ── Helpers ──
function getStore(text, url) {
  const t = (text + url).toLowerCase();
  if (t.includes('amazon') || t.includes('amzn')) return 'amazon';
  if (t.includes('flipkart') || t.includes('shopsy') || t.includes('fktr')) return 'flipkart';
  if (t.includes('myntra')) return 'myntra';
  if (t.includes('ajio')) return 'ajio';
  if (t.includes('meesho')) return 'meesho';
  if (t.includes('nykaa')) return 'nykaa';
  return 'other';
}

function getStoreBadge(store) {
  const map = {
    amazon:   '<span class="store-badge badge-amazon">Amazon</span>',
    flipkart: '<span class="store-badge badge-flipkart">Flipkart</span>',
    myntra:   '<span class="store-badge badge-myntra">Myntra</span>',
    ajio:     '<span class="store-badge badge-ajio">Ajio</span>',
    meesho:   '<span class="store-badge badge-meesho">Meesho</span>',
    nykaa:    '<span class="store-badge badge-nykaa">Nykaa</span>',
    other:    '<span class="store-badge badge-other">Deal</span>',
  };
  return map[store] || map.other;
}

function timeAgo(ts) {
  if(!ts) return 'recently';
  const dateObj = new Date(ts);
  if (isNaN(dateObj)) return 'recently';
  const diff = Math.floor((Date.now() - dateObj) / 1000);
  if (diff < 60)   return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400)return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function cleanTitle(text) {
  return (text || '')
    .replace(/\[.*?\]\(https?:\/\/[^)]+\)/g, '')  
    .replace(/https?:\/\/\S+/g, '')                  
    .replace(/🔗\s*/g, '')                           
    .replace(/🛒 Deals by @\S+/g, '')                 
    .replace(/\*\*/g, '')
    .trim().substring(0, 100) || 'Hot Deal!';
}

// ── IMPROVED ASIN & IMAGE LOGIC ──
function getAsin(url) {
  if (!url) return null;
  // Improved regex to catch /dp/, /gp/product/, /gp/aw/d/ etc.
  const m = url.match(/(?:dp|gp\/product|gp\/aw\/d|asin)\/([A-Z0-9]{10})/i);
  return m ? m[1] : null;
}

function getBestImage(deal, store) {
  if (!deal) return '';
  
  // 1. If the scraper provided a valid image, use it
  let img = deal.image || '';
  
  // 2. If it's Amazon, try to generate a high-quality image URL from ASIN
  // This works even if the scraper didn't find an image!
  if (store === 'amazon') {
    const asin = getAsin(deal.url);
    if (asin) {
      // Using the more reliable m.media-amazon.com endpoint
      return `https://m.media-amazon.com/images/P/${asin}.01._SCLZZZZZZZ_AC_SY400_.jpg`;
    }
  }
  
  // 3. Clean up common broken image patterns from scrapers
  if (img.includes('ws-in.amazon-adsystem') || img.length < 5) {
      return '';
  }

  return img;
}

const storeColors = {
  amazon: '#FF9900', flipkart: '#2874F0', myntra: '#FF3F6C',
  ajio: '#1a1a1a', meesho: '#F16565', other: '#553C9A'
};

// ── Render ──
function renderDeals(deals) {
  const grid = document.getElementById('deals-grid');
  
  if (!deals || !Array.isArray(deals)) {
     grid.innerHTML = '<div class="loading"><p>⚠️ Error loading deals.</p></div>';
     return;
  }

  if (!deals.length) {
    grid.innerHTML = '<div class="loading"><p>🔍 No deals found.</p></div>';
    return;
  }
  
  grid.innerHTML = deals.map((deal, i) => {
    const store = getStore(deal.text||'', deal.url||'');
    const bestImage = getBestImage(deal, store);
    const bg = storeColors[store] || storeColors.other;
    
    // Logic: If image exists, show it. If it fails to load (404), hide it and show placeholder.
    let imageHtml = `
      <div class="card-img-wrap">
        ${bestImage ? `
          <img src="${bestImage}" 
               alt="Product" 
               loading="lazy" 
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" 
          />` : ''}
        <div class="card-img-placeholder" style="${bestImage ? 'display:none;' : 'display:flex;'} background:${bg}">
          <span>${store.toUpperCase()} DEAL</span>
        </div>
      </div>`;

    return `
    <div class="deal-card" style="animation-delay:${i * 0.03}s">
      ${imageHtml}
      <div class="card-header">
        ${getStoreBadge(store)}
        <span class="time-ago">${timeAgo(deal.timestamp)}</span>
      </div>
      <div class="card-body">
        <p class="deal-title">${cleanTitle(deal.text)}</p>
      </div>
      <div class="card-footer">
        <a href="${deal.url||'#'}" target="_blank" rel="nofollow" class="deal-link">
          🛒 Grab This Deal →
        </a>
      </div>
    </div>`;
  }).join('');
}

function filterDeals(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = type === 'all' ? allDeals : allDeals.filter(d => getStore(d.text||'', d.url||'') === type);
  renderDeals(filtered);
}

function searchDeals(query) {
  const q = query.toLowerCase().trim();
  if (!q) { renderDeals(allDeals); return; }
  const filtered = allDeals.filter(d => (d.text || '').toLowerCase().includes(q));
  renderDeals(filtered);
}

async function loadDeals() {
  try {
    const res = await fetch('deals.json?t=' + Date.now());
    allDeals = await res.json();
    document.getElementById('deal-count').textContent = allDeals.length;
    if (allDeals[0]) document.getElementById('last-update').textContent = timeAgo(allDeals[0].timestamp);
    renderDeals(allDeals);
  } catch(e) {
    document.getElementById('deals-grid').innerHTML = '<div class="loading"><p>⏳ Refreshing deals...</p></div>';
  }
}

loadDeals();
setInterval(loadDeals, 60000); 
</script>
