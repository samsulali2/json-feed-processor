<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Online Deals 🔥 Best Deals in India</title>
    <meta name="description" content="Best online deals, offers and discounts from Amazon, Flipkart and more. Updated every 5 minutes!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #FF2D2D;
            --orange: #FF6B00;
            --yellow: #FFD600;
            --green: #00C853;
            --dark: #0F0C29;
            --card: #16213E;
            --text: #F8F9FA;
            --muted: #A0AEC0;
            --sidebar: 260px;
            --spacing-unit: 8px;   /* base for consistent tight spacing */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            line-height: 1.45;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .tg-float {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 999;
            background: #229ED9;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 20px rgba(34,158,217,0.4);
            transition: all 0.25s ease;
        }
        .tg-float:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 8px 30px rgba(34,158,217,0.5); }

        header {
            background: linear-gradient(to bottom, #0F0C29, #1a173f);
            box-shadow: 0 6px 24px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        .header-inner {
            max-width: 1440px;
            margin: 0 auto;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo-banner {
            height: 54px;
            width: auto;
            filter: drop-shadow(0 0 12px rgba(255,107,0,0.6));
            transition: filter 0.4s;
        }
        .logo-banner:hover { filter: drop-shadow(0 0 20px rgba(255,107,0,0.9)); }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .live-badge {
            background: rgba(255,45,45,0.18);
            color: var(--red);
            border: 1px solid rgba(255,45,45,0.35);
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
        }
        .live-dot {
            width: 8px; height: 8px;
            background: var(--red);
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out;
        }

        nav {
            display: flex;
            gap: 8px;
        }
        nav a {
            color: var(--yellow);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255,214,0,0.08);
            border: 1px solid rgba(255,214,0,0.15);
            transition: all 0.2s ease;
        }
        nav a:hover {
            background: rgba(255,107,0,0.25);
            border-color: var(--orange);
            color: white;
        }

        .hero {
            background: linear-gradient(135deg, #0F0C29 0%, #1e1845 100%);
            text-align: center;
            padding: 32px 20px 20px;
            position: relative;
        }

        .hero h1 {
            font-family: 'Bangers', cursive;
            font-size: clamp(2.1rem, 6vw, 3.8rem);
            letter-spacing: 2px;
            background: linear-gradient(90deg, #FF2D2D, #FF6B00, #FFD600, #FF6B00, #FF2D2D);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 4s linear infinite;
            margin-bottom: 6px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .fire-emoji {
            font-size: 1.1em;
            display: inline-block;
            animation: fire-flicker 2.2s infinite ease-in-out;
        }

        @keyframes fire-flicker {
            0%, 100% { opacity: 0.92; transform: scale(1) rotate(0deg); text-shadow: 0 0 12px #FF6B00, 0 0 24px #FF2D2D; }
            25%  { opacity: 1;    transform: scale(1.08) rotate(2deg); text-shadow: 0 0 20px #FFD600, 0 0 36px #FF4500; }
            50%  { opacity: 0.88; transform: scale(0.96) rotate(-1deg); text-shadow: 0 0 16px #FF8C00, 0 0 28px #FF2D2D; }
            75%  { opacity: 1;    transform: scale(1.05) rotate(1deg); text-shadow: 0 0 18px #FFD600, 0 0 32px #FF4500; }
        }

        @keyframes gradient-shift {
            0%   { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .hero p {
            color: var(--muted);
            font-size: 14.5px;
            font-weight: 500;
        }

        .stats-bar {
            background: var(--card);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            padding: 10px 24px;
        }
        .stats-inner {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--muted);
        }
        .stat strong { color: var(--yellow); font-weight: 700; }

        .visitor-badge {
            margin-left: auto;
            background: rgba(255,214,0,0.08);
            border: 1px solid rgba(255,214,0,0.15);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            color: var(--yellow);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .page-body {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            gap: 16px;
            padding: 16px 24px;
            align-items: flex-start;
        }

        .sidebar {
            width: var(--sidebar);
            flex-shrink: 0;
            position: sticky;
            top: 76px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 14px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .sidebar-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .sidebar-card h3 {
            font-family: 'Bangers', cursive;
            font-size: 1.15rem;
            letter-spacing: 0.8px;
            color: var(--yellow);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .feature-item:last-child { border-bottom: none; }

        .feature-icon-sm { font-size: 20px; flex-shrink: 0; }

        .feature-item h4 { font-size: 12.5px; font-weight: 700; color: var(--text); }
        .feature-item p { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

        .about-text {
            font-size: 12.5px;
            color: var(--muted);
            line-height: 1.6;
        }
        .about-text + .about-text { margin-top: 8px; }

        .main-content { flex: 1; min-width: 0; }

        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .filter-btn {
            padding: 7px 16px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.08);
            background: transparent;
            color: var(--muted);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--orange);
            border-color: var(--orange);
            color: white;
            transform: translateY(-1px);
        }

        .section-title {
            font-family: 'Bangers', cursive;
            font-size: 1.55rem;
            letter-spacing: 1.5px;
            color: var(--yellow);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .deals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
            gap: 12px;
        }

        .deal-card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            transition: all 0.25s ease;
            animation: card-in 0.5s ease both;
        }
        .deal-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 36px rgba(0,0,0,0.35);
            border-color: rgba(255,107,0,0.35);
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            padding: 10px 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .store-badge {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 3px 9px;
            border-radius: 10px;
        }

        .badge-amazon { background: #FF9900; color: #000; }
        .badge-flipkart { background: #2874F0; color: #fff; }
        .badge-myntra { background: #FF3F6C; color: #fff; }
        .badge-other { background: #553C9A; color: #fff; }

        .time-ago { font-size: 11px; color: var(--muted); }

        .card-body { padding: 8px 12px; flex: 1; }

        .deal-title {
            font-size: 13.2px;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer { padding: 8px 12px 12px; }

        .deal-link {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #FF2D2D, #FF6B00);
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 12.2px;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .deal-link:hover { opacity: 0.92; transform: scale(0.98); }

        .deal-link::after {
            content: '';
            position: absolute;
            top: -50%; left: -60%;
            width: 40%; height: 200%;
            background: rgba(255,255,255,0.18);
            transform: skewX(-20deg);
            animation: shimmer 3.5s infinite;
        }

        @keyframes shimmer {
            0%   { left: -60%; }
            100% { left: 120%; }
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--muted);
            grid-column: 1 / -1;
        }
        .loading-spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,107,0,0.15);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            background: #0A081F;
            text-align: center;
            padding: 16px;
            color: var(--muted);
            font-size: 12px;
            margin-top: 24px;
        }
        footer a { color: var(--orange); text-decoration: none; }

        @media (max-width: 992px) {
            .sidebar { display: none; }
            .page-body { padding: 16px; }
        }
        @media (max-width: 768px) {
            .deals-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
            .header-inner { padding: 10px 16px; }
            .hero { padding: 24px 16px 16px; }
        }
        @media (max-width: 480px) {
            .deals-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: clamp(1.9rem, 8vw, 2.8rem); }
        }
    </style>
</head>
