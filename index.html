<script>

/* =========================
   NEW: IMAGE ANALYZER
========================= */
function analyzeImage(img){
  try{
    if(!img.complete || img.naturalWidth === 0) return;

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    const w = img.naturalWidth;
    const h = img.naturalHeight;

    canvas.width = w;
    canvas.height = h;

    ctx.drawImage(img, 0, 0);

    const data = ctx.getImageData(0,0,w,h).data;

    let light = 0, total = 0;

    for(let i=0;i<data.length;i+=80){
      const r=data[i], g=data[i+1], b=data[i+2], a=data[i+3];

      if(a < 50) continue;

      const brightness = (r+g+b)/3;

      if(brightness > 200) light++;
      total++;
    }

    if(total === 0) return;

    const ratio = light/total;

    if(ratio > 0.6){
      img.classList.add('needs-bg');
    } else {
      img.classList.add('has-glow');
    }

  }catch(e){
    // safe fallback (no crash)
  }
}

/* =========================
   YOUR ORIGINAL CODE BELOW
   (UNCHANGED except img tag)
========================= */

function renderDeals(deals){
  const grid=document.getElementById('deals-grid');
  if(!deals||deals.length===0){
    grid.innerHTML='<div class="loading">😕 No deals found. Check back soon!</div>';
    return;
  }

  grid.innerHTML=deals.map(deal=>{
    const store    = getStore(deal.text, deal.url, deal.product_url);
    const imgUrl   = getBestImage(deal, store);
    const title    = extractTitle(deal.text);
    const price    = extractPrice(deal.text);
    const extra    = extractExtra(deal.text);
    const emoji    = getEmoji(store);
    const eProdUrl = escAttr(deal.product_url || '');
    const eText    = escAttr((deal.text || '').substring(0, 200));
    const eUrl     = escAttr(deal.url || '');

    return `
      <div class="deal-card">
        <div class="card-img-wrap">
          ${imgUrl
            ? `<img src="${imgUrl}" loading="lazy" data-fb-idx="0"
                crossorigin="anonymous"
                onload="analyzeImage(this)"
                onerror="tryFallbackImage(this,'${eProdUrl}','${eText}','${eUrl}','${store}')">`
            : `<div class="card-img-placeholder">${emoji}</div>`
          }
        </div>

        <div class="card-badges">
          <span class="store-badge badge-${store}">${store}</span>
          <span class="time-ago">${timeAgo(deal.timestamp)}</span>
        </div>

        <div class="card-body">
          <div class="deal-title">${title}</div>
          ${price ? `<div class="deal-price">${price}</div>` : ''}
          ${extra ? `<div class="deal-extra">${extra}</div>`  : ''}
        </div>

        <a href="${deal.url||'#'}" target="_blank" rel="noopener" class="deal-link">Buy Now →</a>
      </div>`;
  }).join('');
}
