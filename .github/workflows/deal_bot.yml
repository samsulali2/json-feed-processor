name: Telegram Affiliate Deal Bot

on:
  schedule:
    # Runs every 10 minutes between 9AM and 11PM IST
    # IST = UTC + 5:30, so 9AM IST = 3:30 UTC, 11PM IST = 17:30 UTC
    - cron: "*/10 3-17 * * *"   # 3AM to 5PM UTC = 8:30AM to 10:30PM IST (close enough)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install telethon requests

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: last_seen.json
          key: last-seen-state-v1

      - name: Run bot
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          YOUR_CHANNEL_USERNAME: ${{ secrets.YOUR_CHANNEL_USERNAME }}
          SOURCE_CHANNELS: ${{ secrets.SOURCE_CHANNELS }}
          AMAZON_AFFILIATE_ID: ${{ secrets.AMAZON_AFFILIATE_ID }}
          FLIPKART_AFFILIATE_ID: ${{ secrets.FLIPKART_AFFILIATE_ID }}
        run: python bot.py

      - name: Save state cache
        uses: actions/cache/save@v4
        with:
          path: last_seen.json
          key: last-seen-state-v1-${{ github.run_id }}
