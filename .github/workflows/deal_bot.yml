name: data-sync

on:
  workflow_dispatch:  # triggered by cron-job.org every 5 min

concurrency:
  group: deal-bot-session
  cancel-in-progress: false   # wait for current run to finish, don't cancel it

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history needed for reliable push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install telethon requests feedparser

      - name: Run bot
        env:
          A1: ${{ secrets.TELEGRAM_API_ID }}
          A2: ${{ secrets.TELEGRAM_API_HASH }}
          A3: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          A4: ${{ secrets.TELEGRAM_SESSION_STRING }}
          A5: ${{ secrets.YOUR_CHANNEL_USERNAME }}
          A6: ${{ secrets.SOURCE_CHANNELS }}
          A7: ${{ secrets.AMAZON_AFFILIATE_ID }}
          A8: ${{ secrets.CUELINKS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RSS2JSON_API_KEY: ${{ secrets.RSS2JSON_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: python main.py

      # Commit deals.json (website) + last_seen.json (state) back to repo
      # Pull latest first to avoid push conflicts from concurrent runs
      - name: Commit and push state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add deals.json last_seen.json seen_hashes.json
          git diff --staged --quiet && echo "no changes to commit" || (
            git commit -m "sync: update deals and state [skip ci]"
            git push origin main
          )
