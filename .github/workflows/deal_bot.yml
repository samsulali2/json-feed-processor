name: data-sync

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Restore cached state files ─────────────────────────────────────────
      # last_seen.json tracks last processed message ID per channel
      # WITHOUT this, every run is a "first run" and re-processes old messages
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: |
            last_seen.json
          key: state-${{ github.ref }}-${{ hashFiles('last_seen.json') }}
          restore-keys: |
            state-${{ github.ref }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install telethon requests beautifulsoup4

      - name: Run bot
        env:
          A1: ${{ secrets.TELEGRAM_API_ID }}
          A2: ${{ secrets.TELEGRAM_API_HASH }}
          A3: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          A4: ${{ secrets.TELEGRAM_SESSION_STRING }}
          A5: ${{ secrets.YOUR_CHANNEL_USERNAME }}
          A6: ${{ secrets.SOURCE_CHANNELS }}
          A7: ${{ secrets.AMAZON_AFFILIATE_ID }}
          A8: ${{ secrets.CUELINKS_API_KEY }}
        run: python main.py

      # ── Commit state + deals to repo ───────────────────────────────────────
      # Committing last_seen.json ensures state persists even if cache misses
      # Committing deals.json triggers GitHub Pages update for the website
      - name: Save state and deals to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deals.json last_seen.json
          git diff --staged --quiet && echo "no changes" || git commit -m "sync [skip ci]"
          git push
