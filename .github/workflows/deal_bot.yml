name: data-sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache/restore@v4
        with:
          path: |
            last_seen.json
            seen_web.json
            deals.json
          key: cache-v2-${{ github.run_id }}
          restore-keys: |
            cache-v2-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          A1: ${{ secrets.TELEGRAM_API_ID }}
          A2: ${{ secrets.TELEGRAM_API_HASH }}
          A3: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          A4: ${{ secrets.TELEGRAM_SESSION_STRING }}
          A5: ${{ secrets.YOUR_CHANNEL_USERNAME }}
          A6: ${{ secrets.SOURCE_CHANNELS }}
          A7: ${{ secrets.AMAZON_AFFILIATE_ID }}
          A8: ${{ secrets.CUELINKS_API_KEY }}

      - uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            last_seen.json
            seen_web.json
            deals.json
          key: cache-v2-${{ github.run_id }}

      - name: Publish deals
        if: always()
        run: |
          git config user.name "bot"
          git config user.email "bot@bot"
          git add deals.json || true
          git diff --cached --quiet || git commit -m "d [skip ci]"
          git push origin HEAD || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
