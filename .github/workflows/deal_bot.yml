name: Deal Bot + Website

on:
  schedule:
    - cron: "*/10 3-17 * * *"   # 8:30 AM – 10:30 PM IST every 10 min
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: |
            last_seen.json
            deals.json
            seen_web.json
          key: bot-state-v2-${{ github.run_id }}
          restore-keys: |
            bot-state-v2-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install telethon requests beautifulsoup4

      - name: Run bot
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          YOUR_CHANNEL_USERNAME: ${{ secrets.YOUR_CHANNEL_USERNAME }}
          SOURCE_CHANNELS: ${{ secrets.SOURCE_CHANNELS }}
          AMAZON_AFFILIATE_ID: ${{ secrets.AMAZON_AFFILIATE_ID }}
          CUELINKS_API_KEY: ${{ secrets.CUELINKS_API_KEY }}
        run: python bot.py

      - name: Save cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            last_seen.json
            deals.json
            seen_web.json
          key: bot-state-v2-${{ github.run_id }}

      - name: Publish deals to GitHub Pages
        if: always()
        run: |
          git config user.name "Deal Bot"
          git config user.email "bot@deals"
          git add deals.json index.html || true
          git diff --cached --quiet || git commit -m "🤖 Update deals [skip ci]"
          git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
